<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Loss feedback loop</title>
  <desc id="desc">Prediction is compared with a target to produce error, loss, and an update signal that flows back toward the network.</desc>
  <defs>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <radialGradient id="blue" cx="36%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="cyan" cx="36%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </radialGradient>
    <radialGradient id="purple" cx="36%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
    <marker id="back-arrow" viewBox="0 0 10 10" refX="1.6" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="1400" height="760" rx="38" fill="#fbfdff"/>
  <circle cx="190" cy="128" r="190" fill="#06b6d4" opacity="0.075"/>
  <circle cx="1200" cy="618" r="230" fill="#7c3aed" opacity="0.075"/>
  <g filter="url(#shadow)">
    <rect x="66" y="184" width="214" height="272" rx="26" fill="url(#panel)"/>
    <rect x="334" y="184" width="214" height="272" rx="26" fill="url(#panel)"/>
    <rect x="602" y="184" width="214" height="272" rx="26" fill="url(#panel)"/>
    <rect x="870" y="160" width="230" height="320" rx="30" fill="#ffffff"/>
    <rect x="1154" y="184" width="214" height="272" rx="26" fill="url(#panel)"/>
  </g>
  <g stroke="url(#accent)" stroke-width="8" stroke-linecap="round" filter="url(#glow)">
    <path d="M 282 320 H 324" marker-end="url(#arrow)"/>
    <path d="M 550 320 H 592" marker-end="url(#arrow)"/>
    <path d="M 818 320 H 858" marker-end="url(#arrow)"/>
    <path d="M 1102 320 H 1144" marker-end="url(#arrow)"/>
  </g>
  <path d="M 1246 482 C 1084 618 808 646 530 580 C 360 540 226 540 150 584" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" marker-end="url(#back-arrow)" filter="url(#glow)" opacity="0.9"/>
  <g stroke="#ffffff" stroke-width="7">
    <circle cx="140" cy="278" r="25" fill="url(#blue)"/>
    <circle cx="208" cy="278" r="25" fill="url(#cyan)"/>
    <circle cx="140" cy="372" r="25" fill="url(#purple)"/>
    <circle cx="208" cy="372" r="25" fill="url(#blue)"/>
    <circle cx="402" cy="266" r="26" fill="url(#purple)"/>
    <circle cx="476" cy="378" r="26" fill="url(#cyan)"/>
  </g>
  <path d="M 398 378 C 430 302 456 274 496 250" fill="none" stroke="#7c3aed" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M 664 252 L 756 392 M 756 252 L 664 392" stroke="#0f172a" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <circle cx="710" cy="322" r="36" fill="#ffffff" stroke="url(#accent)" stroke-width="8" filter="url(#glow)"/>
  <path d="M 930 392 C 958 278 1008 214 1064 198 C 1070 262 1066 348 1048 430" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="920" y1="430" x2="1062" y2="430" stroke="#c7d8ee" stroke-width="5" stroke-linecap="round"/>
  <line x1="920" y1="430" x2="920" y2="220" stroke="#c7d8ee" stroke-width="5" stroke-linecap="round"/>
  <circle cx="1064" cy="198" r="18" fill="url(#purple)" stroke="#ffffff" stroke-width="6"/>
  <path d="M 1210 278 C 1248 236 1300 236 1322 280" fill="none" stroke="#1d4ed8" stroke-width="7" stroke-linecap="round"/>
  <path d="M 1204 374 C 1256 432 1310 420 1330 356" fill="none" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
  <g stroke="#ffffff" stroke-width="6">
    <circle cx="1212" cy="452" r="17" fill="url(#cyan)"/>
    <circle cx="1298" cy="456" r="17" fill="url(#blue)"/>
  </g>
</svg>
