<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Raw data transformed into representation space</title>
  <desc id="desc">Three-stage visual pipeline showing nonlinear raw data, hidden layer transformation, and a representation space with a simple separating boundary.</desc>
  <defs>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <radialGradient id="blue-dot" cx="36%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="cyan-dot" cx="36%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </radialGradient>
    <radialGradient id="purple-dot" cx="36%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 H 0 V 42" fill="none" stroke="#d9e6f5" stroke-width="1" opacity="0.5"/>
    </pattern>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
  </defs>
  <rect width="1400" height="760" rx="38" fill="#fbfdff"/>
  <circle cx="190" cy="122" r="190" fill="#06b6d4" opacity="0.075"/>
  <circle cx="1194" cy="622" r="230" fill="#7c3aed" opacity="0.075"/>
  <g filter="url(#shadow)">
    <rect x="56" y="96" width="358" height="552" rx="30" fill="url(#panel)"/>
    <rect x="522" y="96" width="356" height="552" rx="30" fill="url(#panel)"/>
    <rect x="986" y="96" width="358" height="552" rx="30" fill="url(#panel)"/>
  </g>
  <rect x="84" y="126" width="302" height="492" rx="24" fill="url(#grid)" stroke="#d9e6f5" stroke-width="2"/>
  <rect x="1014" y="126" width="302" height="492" rx="24" fill="url(#grid)" stroke="#d9e6f5" stroke-width="2"/>
  <path d="M 454 376 C 478 338 492 338 516 376" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)" filter="url(#glow)"/>
  <path d="M 918 376 C 942 338 956 338 980 376" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)" filter="url(#glow)"/>
  <g fill="none" stroke-width="5" opacity="0.62">
    <path d="M 126 248 C 196 128 330 188 314 308 C 300 412 142 340 128 462 C 118 540 244 590 338 478" stroke="#1d4ed8"/>
    <path d="M 126 486 C 184 596 332 560 338 420 C 344 288 132 342 164 222 C 184 150 296 166 336 266" stroke="#7c3aed"/>
  </g>
  <g stroke="#ffffff" stroke-width="7">
    <circle cx="150" cy="270" r="17" fill="url(#blue-dot)"/>
    <circle cx="214" cy="196" r="16" fill="url(#blue-dot)"/>
    <circle cx="326" cy="282" r="17" fill="url(#blue-dot)"/>
    <circle cx="178" cy="386" r="18" fill="url(#blue-dot)"/>
    <circle cx="320" cy="492" r="17" fill="url(#blue-dot)"/>
    <circle cx="150" cy="498" r="17" fill="url(#purple-dot)"/>
    <circle cx="236" cy="548" r="18" fill="url(#purple-dot)"/>
    <circle cx="326" cy="402" r="16" fill="url(#purple-dot)"/>
    <circle cx="166" cy="328" r="17" fill="url(#purple-dot)"/>
    <circle cx="282" cy="232" r="18" fill="url(#purple-dot)"/>
  </g>
  <g stroke="#94a3b8" stroke-width="3.4" stroke-linecap="round" opacity="0.68">
    <line x1="594" y1="188" x2="704" y2="142"/><line x1="594" y1="188" x2="704" y2="250"/><line x1="594" y1="188" x2="704" y2="358"/><line x1="594" y1="188" x2="704" y2="466"/>
    <line x1="594" y1="318" x2="704" y2="142"/><line x1="594" y1="318" x2="704" y2="250"/><line x1="594" y1="318" x2="704" y2="358"/><line x1="594" y1="318" x2="704" y2="466"/>
    <line x1="594" y1="448" x2="704" y2="142"/><line x1="594" y1="448" x2="704" y2="250"/><line x1="594" y1="448" x2="704" y2="358"/><line x1="594" y1="448" x2="704" y2="466"/>
    <line x1="704" y1="142" x2="808" y2="232"/><line x1="704" y1="250" x2="808" y2="232"/><line x1="704" y1="358" x2="808" y2="232"/><line x1="704" y1="466" x2="808" y2="232"/>
    <line x1="704" y1="142" x2="808" y2="394"/><line x1="704" y1="250" x2="808" y2="394"/><line x1="704" y1="358" x2="808" y2="394"/><line x1="704" y1="466" x2="808" y2="394"/>
  </g>
  <g stroke="#ffffff" stroke-width="7">
    <circle cx="594" cy="188" r="22" fill="url(#blue-dot)"/>
    <circle cx="594" cy="318" r="22" fill="url(#cyan-dot)"/>
    <circle cx="594" cy="448" r="22" fill="url(#purple-dot)"/>
    <circle cx="704" cy="142" r="23" fill="url(#cyan-dot)"/>
    <circle cx="704" cy="250" r="23" fill="url(#purple-dot)"/>
    <circle cx="704" cy="358" r="23" fill="url(#blue-dot)"/>
    <circle cx="704" cy="466" r="23" fill="url(#cyan-dot)"/>
    <circle cx="808" cy="232" r="24" fill="url(#blue-dot)"/>
    <circle cx="808" cy="394" r="24" fill="url(#purple-dot)"/>
  </g>
  <path d="M 1050 512 L 1282 208" stroke="url(#accent)" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>
  <g stroke="#ffffff" stroke-width="7">
    <circle cx="1084" cy="444" r="18" fill="url(#blue-dot)"/>
    <circle cx="1140" cy="508" r="17" fill="url(#blue-dot)"/>
    <circle cx="1198" cy="434" r="18" fill="url(#blue-dot)"/>
    <circle cx="1260" cy="490" r="17" fill="url(#blue-dot)"/>
    <circle cx="1088" cy="284" r="17" fill="url(#purple-dot)"/>
    <circle cx="1152" cy="216" r="18" fill="url(#purple-dot)"/>
    <circle cx="1218" cy="292" r="17" fill="url(#purple-dot)"/>
    <circle cx="1270" cy="230" r="17" fill="url(#purple-dot)"/>
  </g>
  <path d="M 1056 568 C 1138 524 1232 530 1294 568" fill="none" stroke="#06b6d4" stroke-width="5" stroke-linecap="round" opacity="0.58"/>
  <path d="M 1064 174 C 1138 132 1238 136 1292 178" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
</svg>
