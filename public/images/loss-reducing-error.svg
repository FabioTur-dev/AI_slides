<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Learning means reducing error</title>
  <desc id="desc">A clear feedback loop showing input entering a network, the network producing a prediction, prediction and target being compared as loss, and the update signal returning to the network.</desc>
  <defs>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="48%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="loss" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="52%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="blue-dot" cx="35%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="cyan-dot" cx="35%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </radialGradient>
    <radialGradient id="purple-dot" cx="35%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-22%" width="140%" height="146%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1400" height="760" rx="38" fill="#fbfdff"/>
  <circle cx="196" cy="120" r="190" fill="#06b6d4" opacity="0.075"/>
  <circle cx="1210" cy="626" r="235" fill="#7c3aed" opacity="0.075"/>
  <path d="M 86 638 C 286 692 562 702 826 648 C 1030 606 1212 622 1320 666" fill="none" stroke="#d9e6f5" stroke-width="3" opacity="0.72"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0">
    <g filter="url(#shadow)">
      <rect x="76" y="306" width="176" height="86" rx="26" fill="url(#panel)" stroke="#d9e6f5" stroke-width="2"/>
      <rect x="306" y="250" width="260" height="196" rx="30" fill="url(#panel)" stroke="#d9e6f5" stroke-width="2"/>
      <rect x="660" y="146" width="262" height="146" rx="28" fill="url(#panel)" stroke="#d9e6f5" stroke-width="2"/>
      <rect x="660" y="402" width="262" height="146" rx="28" fill="url(#panel)" stroke="#d9e6f5" stroke-width="2"/>
      <rect x="1012" y="252" width="222" height="184" rx="30" fill="url(#loss)"/>
      <rect x="1018" y="532" width="222" height="118" rx="28" fill="url(#panel)" stroke="#d9e6f5" stroke-width="2"/>
    </g>

    <path d="M 252 349 H 298" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-cyan)" filter="url(#soft-glow)"/>
    <path d="M 566 318 C 604 288 622 244 652 222" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-cyan)" filter="url(#soft-glow)"/>
    <path d="M 922 219 C 954 230 976 258 1004 302" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-cyan)" filter="url(#soft-glow)"/>
    <path d="M 922 475 C 956 456 982 420 1004 386" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-cyan)" filter="url(#soft-glow)"/>
    <path d="M 1123 436 V 524" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-purple)" filter="url(#soft-glow)"/>
    <path d="M 1018 604 C 852 698 538 704 428 456" fill="none" stroke="#7c3aed" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-purple)" opacity="0.82"/>

    <g stroke="#94a3b8" stroke-width="3.2" stroke-linecap="round" opacity="0.62">
      <line x1="370" y1="316" x2="438" y2="286"/>
      <line x1="370" y1="316" x2="438" y2="356"/>
      <line x1="370" y1="316" x2="438" y2="420"/>
      <line x1="438" y1="286" x2="506" y2="338"/>
      <line x1="438" y1="356" x2="506" y2="338"/>
      <line x1="438" y1="420" x2="506" y2="338"/>
    </g>

    <g stroke="#ffffff" stroke-width="6">
      <circle cx="370" cy="316" r="20" fill="url(#blue-dot)"/>
      <circle cx="370" cy="384" r="20" fill="url(#cyan-dot)"/>
      <circle cx="438" cy="286" r="20" fill="url(#cyan-dot)"/>
      <circle cx="438" cy="356" r="20" fill="url(#purple-dot)"/>
      <circle cx="438" cy="420" r="20" fill="url(#blue-dot)"/>
      <circle cx="506" cy="338" r="22" fill="url(#purple-dot)"/>
    </g>

    <text x="164" y="354" text-anchor="middle" fill="#172033" font-size="37" font-weight="860">Input</text>
    <text x="436" y="292" text-anchor="middle" fill="#172033" font-size="40" font-weight="860">Network</text>
    <text x="436" y="388" text-anchor="middle" fill="#5c6678" font-size="25" font-weight="720">weights</text>

    <text x="791" y="207" text-anchor="middle" fill="#172033" font-size="43" font-weight="860">Prediction</text>
    <text x="791" y="251" text-anchor="middle" fill="#5c6678" font-size="27" font-weight="700">model output</text>

    <text x="791" y="463" text-anchor="middle" fill="#172033" font-size="43" font-weight="860">Target</text>
    <text x="791" y="507" text-anchor="middle" fill="#5c6678" font-size="27" font-weight="700">correct answer</text>

    <text x="1123" y="326" text-anchor="middle" fill="#ffffff" font-size="50" font-weight="900">Loss</text>
    <text x="1123" y="378" text-anchor="middle" fill="#eef8ff" font-size="29" font-weight="740">measured error</text>

    <text x="1129" y="582" text-anchor="middle" fill="#172033" font-size="42" font-weight="860">Update</text>
    <text x="1129" y="622" text-anchor="middle" fill="#5c6678" font-size="26" font-weight="700">adjust weights</text>

    <g>
      <rect x="886" y="328" width="116" height="42" rx="21" fill="#ffffff" stroke="#d9e6f5" stroke-width="2"/>
      <text x="944" y="356" text-anchor="middle" fill="#384458" font-size="24" font-weight="820">compare</text>
    </g>

    <g>
      <rect x="584" y="622" width="248" height="46" rx="23" fill="#ffffff" stroke="#d9e6f5" stroke-width="2"/>
      <text x="708" y="653" text-anchor="middle" fill="#7c3aed" font-size="25" font-weight="840">feedback to network</text>
    </g>
  </g>
</svg>
