<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Perceptron linear decision boundary</title>
  <desc id="desc">Two classes of points in a two-dimensional space separated by a glowing straight boundary with subtle learning movement cues.</desc>
  <defs>
    <linearGradient id="boundary-gradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="52%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="blue-point" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="purple-point" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 H 0 V 44" fill="none" stroke="#d9e6f5" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>
  <rect width="1200" height="700" rx="34" fill="#fbfdff"/>
  <rect x="46" y="44" width="1108" height="612" rx="28" fill="#ffffff" filter="url(#soft-shadow)"/>
  <rect x="46" y="44" width="1108" height="612" rx="28" fill="url(#grid)" opacity="0.82"/>
  <circle cx="238" cy="152" r="150" fill="#06b6d4" opacity="0.08"/>
  <circle cx="978" cy="540" r="170" fill="#7c3aed" opacity="0.08"/>
  <path d="M 150 584 H 1044" stroke="#c7d8ee" stroke-width="3" stroke-linecap="round"/>
  <path d="M 154 584 V 116" stroke="#c7d8ee" stroke-width="3" stroke-linecap="round"/>
  <path d="M 244 568 L 956 222" stroke="#93c5fd" stroke-width="3" stroke-linecap="round" stroke-dasharray="12 18" opacity="0.42"/>
  <path d="M 216 480 L 936 142" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round" stroke-dasharray="12 18" opacity="0.38"/>
  <path d="M 210 526 L 990 166" stroke="url(#boundary-gradient)" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 410 205 C 470 160 548 148 620 174" fill="none" stroke="#06b6d4" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-cyan)" opacity="0.72"/>
  <path d="M 766 518 C 708 548 626 544 560 502" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow-cyan)" opacity="0.55"/>
  <g fill="url(#blue-point)" stroke="#ffffff" stroke-width="6">
    <circle cx="248" cy="488" r="18"/>
    <circle cx="308" cy="536" r="16"/>
    <circle cx="338" cy="440" r="15"/>
    <circle cx="414" cy="502" r="18"/>
    <circle cx="472" cy="414" r="16"/>
    <circle cx="524" cy="470" r="14"/>
    <circle cx="556" cy="560" r="17"/>
    <circle cx="374" cy="592" r="13"/>
    <circle cx="624" cy="394" r="14"/>
  </g>
  <g fill="url(#purple-point)" stroke="#ffffff" stroke-width="6">
    <circle cx="674" cy="206" r="16"/>
    <circle cx="736" cy="262" r="18"/>
    <circle cx="784" cy="172" r="14"/>
    <circle cx="842" cy="250" r="16"/>
    <circle cx="904" cy="334" r="18"/>
    <circle cx="954" cy="232" r="15"/>
    <circle cx="1018" cy="290" r="17"/>
    <circle cx="828" cy="112" r="13"/>
    <circle cx="704" cy="336" r="14"/>
  </g>
  <g fill="none" stroke-width="4" opacity="0.88">
    <circle cx="624" cy="394" r="25" stroke="#1d4ed8"/>
    <circle cx="674" cy="206" r="26" stroke="#7c3aed"/>
  </g>
</svg>
