<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Hidden layers learn representations</title>
  <desc id="desc">A visual pipeline from tangled input data through hidden layer transformations to a representation space with a clean final decision boundary.</desc>
  <defs>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="52%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="blue-dot" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="purple-dot" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="cyan-dot" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 H 0 V 40" fill="none" stroke="#d9e6f5" stroke-width="1" opacity="0.48"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
  </defs>
  <rect width="1200" height="700" rx="34" fill="#fbfdff"/>
  <circle cx="230" cy="130" r="165" fill="#06b6d4" opacity="0.08"/>
  <circle cx="1002" cy="560" r="185" fill="#7c3aed" opacity="0.08"/>
  <g filter="url(#shadow)">
    <rect x="52" y="74" width="270" height="548" rx="28" fill="#ffffff"/>
    <rect x="824" y="74" width="324" height="548" rx="28" fill="#ffffff"/>
  </g>
  <rect x="78" y="102" width="218" height="492" rx="22" fill="url(#grid)" stroke="#d9e6f5" stroke-width="2"/>
  <rect x="850" y="102" width="272" height="492" rx="22" fill="url(#grid)" stroke="#d9e6f5" stroke-width="2"/>
  <g fill="none" stroke-width="4" opacity="0.48">
    <path d="M 116 224 C 182 128 244 170 258 250 C 274 340 142 292 116 392 C 98 464 192 536 264 458" stroke="#1d4ed8"/>
    <path d="M 114 438 C 172 526 256 514 268 408 C 280 306 124 330 142 230 C 154 160 234 178 266 250" stroke="#7c3aed"/>
  </g>
  <g stroke="#ffffff" stroke-width="6">
    <circle cx="132" cy="248" r="15" fill="url(#blue-dot)"/>
    <circle cx="190" cy="188" r="14" fill="url(#blue-dot)"/>
    <circle cx="246" cy="266" r="15" fill="url(#blue-dot)"/>
    <circle cx="166" cy="358" r="16" fill="url(#blue-dot)"/>
    <circle cx="252" cy="438" r="15" fill="url(#blue-dot)"/>
    <circle cx="124" cy="458" r="15" fill="url(#purple-dot)"/>
    <circle cx="204" cy="496" r="16" fill="url(#purple-dot)"/>
    <circle cx="264" cy="384" r="14" fill="url(#purple-dot)"/>
    <circle cx="142" cy="304" r="15" fill="url(#purple-dot)"/>
    <circle cx="226" cy="226" r="16" fill="url(#purple-dot)"/>
  </g>
  <path d="M 346 348 C 422 284 468 284 534 348" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)" filter="url(#glow)"/>
  <path d="M 666 348 C 730 284 772 284 808 348" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)" filter="url(#glow)"/>
  <g stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0.64">
    <line x1="554" y1="194" x2="642" y2="160"/><line x1="554" y1="194" x2="642" y2="250"/><line x1="554" y1="194" x2="642" y2="340"/><line x1="554" y1="194" x2="642" y2="430"/>
    <line x1="554" y1="320" x2="642" y2="160"/><line x1="554" y1="320" x2="642" y2="250"/><line x1="554" y1="320" x2="642" y2="340"/><line x1="554" y1="320" x2="642" y2="430"/>
    <line x1="554" y1="446" x2="642" y2="160"/><line x1="554" y1="446" x2="642" y2="250"/><line x1="554" y1="446" x2="642" y2="340"/><line x1="554" y1="446" x2="642" y2="430"/>
  </g>
  <g stroke="#ffffff" stroke-width="6">
    <circle cx="554" cy="194" r="20" fill="url(#blue-dot)"/>
    <circle cx="554" cy="320" r="20" fill="url(#cyan-dot)"/>
    <circle cx="554" cy="446" r="20" fill="url(#purple-dot)"/>
    <circle cx="642" cy="160" r="20" fill="url(#cyan-dot)"/>
    <circle cx="642" cy="250" r="20" fill="url(#purple-dot)"/>
    <circle cx="642" cy="340" r="20" fill="url(#blue-dot)"/>
    <circle cx="642" cy="430" r="20" fill="url(#cyan-dot)"/>
  </g>
  <path d="M 878 496 L 1094 210" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <g stroke="#ffffff" stroke-width="6">
    <circle cx="914" cy="424" r="16" fill="url(#blue-dot)"/>
    <circle cx="954" cy="486" r="15" fill="url(#blue-dot)"/>
    <circle cx="1008" cy="412" r="16" fill="url(#blue-dot)"/>
    <circle cx="1052" cy="470" r="14" fill="url(#blue-dot)"/>
    <circle cx="920" cy="256" r="15" fill="url(#purple-dot)"/>
    <circle cx="968" cy="198" r="16" fill="url(#purple-dot)"/>
    <circle cx="1028" cy="282" r="15" fill="url(#purple-dot)"/>
    <circle cx="1082" cy="224" r="14" fill="url(#purple-dot)"/>
  </g>
  <path d="M 886 558 C 944 524 1020 528 1086 556" fill="none" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M 888 150 C 950 118 1026 126 1092 160" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
