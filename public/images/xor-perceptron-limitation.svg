<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Perceptron limitation on XOR</title>
  <desc id="desc">A clean visual comparison of a linearly separable pattern and an XOR pattern that cannot be separated by one straight boundary.</desc>
  <defs>
    <linearGradient id="line-gradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="52%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="blue-dot" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <radialGradient id="purple-dot" cx="38%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <pattern id="panel-grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 H 0 V 38" fill="none" stroke="#d9e6f5" stroke-width="1" opacity="0.5"/>
    </pattern>
    <filter id="panel-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <filter id="line-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="34" fill="#fbfdff"/>
  <circle cx="208" cy="110" r="150" fill="#06b6d4" opacity="0.08"/>
  <circle cx="980" cy="520" r="170" fill="#7c3aed" opacity="0.08"/>
  <g filter="url(#panel-shadow)">
    <rect x="50" y="50" width="510" height="520" rx="28" fill="#ffffff"/>
    <rect x="640" y="50" width="510" height="520" rx="28" fill="#ffffff"/>
  </g>
  <rect x="76" y="78" width="458" height="464" rx="20" fill="url(#panel-grid)" stroke="#d9e6f5" stroke-width="2"/>
  <rect x="666" y="78" width="458" height="464" rx="20" fill="url(#panel-grid)" stroke="#d9e6f5" stroke-width="2"/>
  <path d="M 120 496 H 496" stroke="#c7d8ee" stroke-width="3" stroke-linecap="round"/>
  <path d="M 122 496 V 124" stroke="#c7d8ee" stroke-width="3" stroke-linecap="round"/>
  <path d="M 710 496 H 1086" stroke="#c7d8ee" stroke-width="3" stroke-linecap="round"/>
  <path d="M 712 496 V 124" stroke="#c7d8ee" stroke-width="3" stroke-linecap="round"/>
  <path d="M 126 454 L 506 174" stroke="url(#line-gradient)" stroke-width="8" stroke-linecap="round" filter="url(#line-glow)"/>
  <g fill="url(#blue-dot)" stroke="#ffffff" stroke-width="6">
    <circle cx="176" cy="410" r="17"/>
    <circle cx="226" cy="464" r="16"/>
    <circle cx="282" cy="390" r="18"/>
    <circle cx="322" cy="450" r="15"/>
    <circle cx="378" cy="386" r="16"/>
  </g>
  <g fill="url(#purple-dot)" stroke="#ffffff" stroke-width="6">
    <circle cx="256" cy="188" r="16"/>
    <circle cx="318" cy="246" r="18"/>
    <circle cx="390" cy="176" r="15"/>
    <circle cx="436" cy="262" r="17"/>
    <circle cx="470" cy="214" r="14"/>
  </g>
  <path d="M 710 454 L 1092 174" stroke="url(#line-gradient)" stroke-width="7" stroke-linecap="round" opacity="0.46" stroke-dasharray="18 15" filter="url(#line-glow)"/>
  <path d="M 852 238 L 944 330 M 944 238 L 852 330" stroke="#0f172a" stroke-width="10" stroke-linecap="round" opacity="0.58"/>
  <path d="M 736 214 C 816 146 980 145 1054 230" fill="none" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14" opacity="0.55"/>
  <path d="M 734 424 C 832 512 982 514 1060 420" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14" opacity="0.45"/>
  <g fill="url(#blue-dot)" stroke="#ffffff" stroke-width="6">
    <circle cx="772" cy="188" r="17"/>
    <circle cx="830" cy="244" r="16"/>
    <circle cx="804" cy="142" r="15"/>
    <circle cx="998" cy="410" r="18"/>
    <circle cx="1052" cy="458" r="16"/>
    <circle cx="948" cy="462" r="15"/>
  </g>
  <g fill="url(#purple-dot)" stroke="#ffffff" stroke-width="6">
    <circle cx="770" cy="430" r="17"/>
    <circle cx="826" cy="474" r="15"/>
    <circle cx="884" cy="404" r="16"/>
    <circle cx="998" cy="188" r="18"/>
    <circle cx="1054" cy="244" r="16"/>
    <circle cx="950" cy="142" r="15"/>
  </g>
</svg>
